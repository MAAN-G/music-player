<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline</title>
    <style>
      :root{color-scheme:light dark}
      body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;margin:0;display:grid;place-items:center;min-height:100vh;padding:2rem}
      .card{max-width:560px;background:Canvas;color:CanvasText;border:1px solid rgba(0,0,0,.1);border-radius:12px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
      h1{margin:0 0 8px 0}
      p{opacity:.8}
      a{color:#0ea5e9}
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>
        The app shell is cached. Once you've imported songs and opened them at least once,
        playback and browsing will work offline.
      </p>
      <p><a href="/">Return to app</a></p>
    </div>
  </body>
</html>
